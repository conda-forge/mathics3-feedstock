{% set name = "Mathics3" %}
{% set version = "10.0.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: fbf153b110245fbfa4e7f4098f13c86e8d616f986b805ede80d3051b400ddd94

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - mathics = mathics.__main__:main

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - cython
    - pip
    - python
    - setuptools >=70.0.0
  run:
    - Mathics3-Scanner >=10.0.1
    - mpmath >=1.2.0
    - numpy
    - palettable    
    - pillow >=9.2
    - pint
    - python
    - python-dateutil
    - python-magic
    - Pympler
    - pywin32-on-windows
    - Pympler
    - requests
    - scipy
    - setuptools >=70.0.0
    - packaging
    - timed-threads
    - sympy >=1.13
test:
  imports:
    - mathics
    - mathics.algorithm
  commands:
    - pip check
    - mathics --help
  requires:
    - pip

about:
  home: https://mathics.org/
  summary: A general-purpose computer algebra system.
  license: GPL-2.0-or-later
  license_file: COPYING.txt

extra:
  recipe-maintainers:
    - wolfv
    - rocky
    - mmatera
    - GarkGarcia
